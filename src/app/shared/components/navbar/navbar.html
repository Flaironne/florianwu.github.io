<header
  [class]="
    'fixed top-0 left-0 right-0 z-50 transition-all duration-300 ' +
    (isScrolled()
      ? 'bg-zinc-900/95 backdrop-blur-md border-b border-zinc-800 shadow-xl shadow-black/20'
      : 'bg-transparent')
  "
>
  <nav
    class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between"
    aria-label="Navigation principale"
  >
    <!-- Logo -->
    <a
      href="#hero"
      class="font-bold text-xl text-zinc-50 hover:text-emerald-400 transition-colors duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400 rounded"
      (click)="closeMenu()"
      aria-label="Retour en haut de la page"
    >
      <span class="text-emerald-400">F</span>W.
    </a>

    <!-- Desktop links -->
    <ul class="hidden md:flex items-center gap-8" role="list">
      @for (link of navLinks; track link.section) {
        <li>
          <a
            [href]="link.href"
            [class]="
              'text-sm font-medium transition-colors duration-200 relative group py-1 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400 rounded ' +
              (activeSection() === link.section
                ? 'text-emerald-400'
                : 'text-zinc-400 hover:text-zinc-50')
            "
            [attr.aria-current]="activeSection() === link.section ? 'page' : null"
          >
            {{ link.label }}
            <span
              [class]="
                'absolute -bottom-0.5 left-0 h-px bg-emerald-400 transition-all duration-300 ' +
                (activeSection() === link.section ? 'w-full' : 'w-0 group-hover:w-full')
              "
            ></span>
          </a>
        </li>
      }
    </ul>

    <!-- CTA desktop -->
    <a
      href="#contact"
      class="hidden md:inline-flex items-center px-4 py-2 rounded-lg text-sm font-semibold
             bg-emerald-400 text-zinc-950 hover:bg-emerald-300
             transition-colors duration-200 shadow-lg shadow-emerald-400/20
             focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400 focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-950"
    >
      Me contacter
    </a>

    <!-- Hamburger mobile -->
    <button
      type="button"
      class="md:hidden p-2 rounded-lg text-zinc-400 hover:text-zinc-50 hover:bg-zinc-800 transition-colors
             focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-controls="mobile-menu"
      aria-label="Ouvrir le menu de navigation"
    >
      @if (isMenuOpen()) {
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      } @else {
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      }
    </button>
  </nav>

  <!-- Mobile menu -->
  @if (isMenuOpen()) {
    <div
      id="mobile-menu"
      class="md:hidden bg-zinc-900/98 border-b border-zinc-800 px-4 pb-4"
    >
      <ul class="flex flex-col gap-1" role="list">
        @for (link of navLinks; track link.section) {
          <li>
            <a
              [href]="link.href"
              [class]="
                'block px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-200 ' +
                (activeSection() === link.section
                  ? 'text-emerald-400 bg-emerald-400/10'
                  : 'text-zinc-400 hover:text-zinc-50 hover:bg-zinc-800')
              "
              [attr.aria-current]="activeSection() === link.section ? 'page' : null"
              (click)="closeMenu()"
            >
              {{ link.label }}
            </a>
          </li>
        }
        <li class="mt-2">
          <a
            href="#contact"
            class="block px-3 py-2.5 rounded-lg text-sm font-semibold text-center
                   bg-emerald-400 text-zinc-950 hover:bg-emerald-300 transition-colors"
            (click)="closeMenu()"
          >
            Me contacter
          </a>
        </li>
      </ul>
    </div>
  }
</header>
